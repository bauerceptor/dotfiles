# ~/.config/starship.toml
# Philosophy: Show what matters, hide what doesn't. Quiet until relevant.

"$schema" = 'https://starship.rs/config-schema.json'

# General
add_newline = true
command_timeout = 1000

# Two-line prompt: info on top, input below
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$jobs\
$time\
$line_break\
$character"""

# Right side shows context only when relevant
right_format = """
$python\
$nodejs\
$rust\
$golang\
$ruby\
$docker_context\
$kubernetes\
$aws\
$terraform\
$direnv\
"""

# Fills space between left and right
[fill]
symbol = " "

# ─────────────────────────────────────────────────────────────
# CORE MODULES
# ─────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold 105)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold 105)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold 75"
read_only = " 󰌾"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Projects" = " "
"~" = " "

# ─────────────────────────────────────────────────────────────
# GIT - The heart of development context
# ─────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bold 141"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

[git_status]
style = "bold 212"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰏗 "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "yellow"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs = true

# ─────────────────────────────────────────────────────────────
# CONTEXT INDICATORS (show only when relevant)
# ─────────────────────────────────────────────────────────────

[username]
show_always = false
style_user = "bold 105"
style_root = "bold red"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "bold 105"
format = "[$hostname]($style) "

[cmd_duration]
min_time = 2_000
style = "bold 222"
format = "[$duration]($style) "
show_milliseconds = false

[jobs]
symbol = "󰠜 "
style = "bold 75"
number_threshold = 1
format = "[$symbol$number]($style) "

[time]
disabled = true  # Enable if you want time shown
format = '[$time]($style) '
style = "243"
time_format = "%H:%M"

# ─────────────────────────────────────────────────────────────
# LANGUAGES - Only show in project directories
# ─────────────────────────────────────────────────────────────

[python]
symbol = " "
style = "bold 220"
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[rust]
symbol = "󱘗 "
style = "bold 208"
format = "[$symbol($version )]($style)"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[golang]
symbol = "󰟓 "
style = "bold cyan"
format = "[$symbol($version )]($style)"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[ruby]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"
detect_extensions = ["rb"]
detect_files = ["Gemfile", ".ruby-version"]

[java]
symbol = " "
style = "bold 167"
format = "[$symbol($version )]($style)"
detect_extensions = ["java", "jar", "gradle", "clj"]
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts"]

[lua]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[php]
symbol = "󰌟 "
style = "bold 141"
format = "[$symbol($version )]($style)"

# ─────────────────────────────────────────────────────────────
# INFRASTRUCTURE & CLOUD
# ─────────────────────────────────────────────────────────────

[docker_context]
symbol = "󰡨 "
style = "bold 75"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bold 75"
format = '[$symbol$context( \($namespace\))]($style) '
detect_extensions = []
detect_files = []
detect_folders = []
contexts = []

[aws]
symbol = "󰸏 "
style = "bold 208"
format = '[$symbol($profile )(\($region\) )]($style)'
disabled = false

[terraform]
symbol = "󱁢 "
style = "bold 141"
format = "[$symbol$workspace]($style) "

[direnv]
disabled = false
symbol = " "
style = "bold 222"
format = "[$symbol$loaded/$allowed]($style) "
detect_files = [".envrc"]

# ─────────────────────────────────────────────────────────────
# CONTAINERS & ENVIRONMENTS
# ─────────────────────────────────────────────────────────────

[container]
symbol = "󰡨 "
style = "bold 75"
format = '[$symbol \[$name\]]($style) '

# Distrobox/Toolbox detection
[env_var.CONTAINER_ID]
variable = "CONTAINER_ID"
symbol = "󰆧 "
style = "bold 75"
format = "[$symbol]($style)"

# ─────────────────────────────────────────────────────────────
# DISABLED - Keep prompt clean
# ─────────────────────────────────────────────────────────────

[package]
disabled = true

[line_break]
disabled = false

[status]
disabled = true

[sudo]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[shell]
disabled = true

[shlvl]
disabled = true

[os]
disabled = false