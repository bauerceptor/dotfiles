# ~/.config/alacritty/alacritty.toml

[general]
live_config_reload = true

[terminal.shell]
program = "/bin/bash"
args = ["--login"]

[env]
TERM = "xterm-256color"

[window]
decorations = "full"
dynamic_padding = true
opacity = 0.97
title = "Terminal"

[window.padding]
x = 12
y = 8

[window.dimensions]
columns = 140
lines = 40

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "Off" }
unfocused_hollow = true

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Plus"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Control"


# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                              THEMES                                       ║
# ║  Uncomment ONE theme section below. Comment out all others.               ║
# ╚═══════════════════════════════════════════════════════════════════════════╝


# ─────────────────────────────────────────────────────────────────────────────
# 🌸 SAKURA - Soft cherry blossom pinks, gentle and dreamy
# ─────────────────────────────────────────────────────────────────────────────

[colors.primary]
background = "#1a1521"
foreground = "#e8d4d4"

[colors.cursor]
text = "#1a1521"
cursor = "#f4a7b9"

[colors.vi_mode_cursor]
text = "#1a1521"
cursor = "#f4a7b9"

[colors.selection]
text = "#1a1521"
background = "#f4a7b9"

[colors.search.matches]
foreground = "#1a1521"
background = "#d4a5a5"

[colors.search.focused_match]
foreground = "#1a1521"
background = "#f4a7b9"

[colors.normal]
black   = "#2a1f2d"
red     = "#e84a5f"
green   = "#a8e6cf"
yellow  = "#ffaaa5"
blue    = "#a8a4ce"
magenta = "#f4a7b9"
cyan    = "#c9b1ff"
white   = "#e8d4d4"

[colors.bright]
black   = "#4a3f4d"
red     = "#ff6b81"
green   = "#bef0db"
yellow  = "#ffc3bf"
blue    = "#beb8db"
magenta = "#ffb7c5"
cyan    = "#d9c7ff"
white   = "#fff0f0"


