[meta]
name = "Tokyo Night Storm"
variant = "dark"
description = "Tokyo Night theme - Storm variant (lighter)"
url = "https://github.com/tokyo-night/tokyo-night-vscode-theme"
preview = "https://github.com/enkia/tokyo-night-vscode-theme#screenshots"

[colors.base]
background = "#24283b"
foreground = "#c0caf5"
cursor = "#c0caf5"
selection_bg = "#364a82"
selection_fg = "#c0caf5"

[colors.ansi]
black = "#1d202f"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#a9b1d6"

[colors.bright]
black = "#414868"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"

[colors.semantic]
error = "#f7768e"
warning = "#e0af68"
success = "#9ece6a"
info = "#7aa2f7"
