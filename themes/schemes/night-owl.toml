[meta]
name = "Night Owl"
variant = "dark"
description = "Low blue light emission for late-night coding - warm amber tones reduce eye strain and preserve circadian rhythm"
purpose = "Late night work (8PM-2AM). Reduces blue light to minimize sleep disruption while maintaining readability."
