[meta]
name = "One Dark"
variant = "dark"
description = "Atom's iconic One Dark theme"
url = "https://github.com/atom/atom/tree/master/packages/one-dark-syntax"
preview = "https://github.com/atom/atom/tree/master/packages/one-dark-syntax"

[colors.base]
background = "#282c34"
foreground = "#abb2bf"
cursor = "#528bff"
selection_bg = "#3e4451"
selection_fg = "#abb2bf"

[colors.ansi]
black = "#282c34"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"

[colors.bright]
black = "#5c6370"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#ffffff"

[colors.semantic]
error = "#e06c75"
warning = "#e5c07b"
success = "#98c379"
info = "#61afef"
