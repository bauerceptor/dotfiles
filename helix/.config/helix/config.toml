# =============================================================================
# Helix Editor Configuration
# =============================================================================

# =============================================================================
# THEME
# =============================================================================
# Light themes
theme = "onelight"
# theme = "catppuccin_latte"
# theme = "github_light"
# theme = "rose_pine_dawn"
# theme = "gruvbox_light"
# theme = "solarized_light"
# theme = "papercolor-light"
# theme = "fleet_light"

# Dark themes
# theme = "onedark"
# theme = "catppuccin_mocha"
# theme = "catppuccin_macchiato"
# theme = "github_dark"
# theme = "rose_pine"
# theme = "gruvbox"
# theme = "tokyonight"
# theme = "tokyonight_storm"
# theme = "kanagawa"
# theme = "dracula"
# theme = "nord"
# theme = "ayu_dark"
# theme = "ayu_mirage"
# theme = "everforest_dark"
# theme = "monokai_pro"

# =============================================================================
# EDITOR
# =============================================================================
[editor]
scrolloff = 8
scroll-lines = 3
mouse = true
middle-click-paste = true
line-number = "relative"
auto-completion = true
auto-format = true
auto-save = true
auto-info = true
idle-timeout = 200
completion-timeout = 200
completion-trigger-len = 1
preview-completion-insert = true
true-color = true
undercurl = true
color-modes = true
rulers = [80, 100, 120]
text-width = 100
bufferline = "multiple"
cursorline = true
cursorcolumn = false
popup-border = "all"
shell = ["fish", "-c"]
default-line-ending = "lf"
insert-final-newline = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["diagnostics"]
right = ["selections", "register", "position", "position-percentage", "file-encoding", "file-line-ending", "file-type", "version-control"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
enable = true
display-messages = true
auto-signature-help = true
display-inlay-hints = true
display-signature-help-docs = true
snippets = true
goto-reference-include-declaration = true

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 0

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.gutters.line-numbers]
min-width = 3

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "
wrap-at-text-width = true

[editor.smart-tab]
enable = true
supersede-menu = false

[editor.whitespace.render]
space = "none"
tab = "all"
nbsp = "all"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.search]
smart-case = true
wrap-around = true

[editor.file-picker]
hidden = false
follow-symlinks = true
deduplicate-links = true
parents = true
ignore = true
git-ignore = true
git-global = true
git-exclude = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
"'" = "'"
"<" = ">"

# =============================================================================
# KEYS - NORMAL MODE
# =============================================================================
[keys.normal]
# Save / Quit
"C-s" = ":write"
"C-S-s" = ":write-all"
"C-q" = ":quit"
"C-S-q" = ":quit-all"

# Window Navigation
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"

# Window Management
"C-\\" = "vsplit"
"C-S-\\" = "hsplit"
"C-w" = { "v" = "vsplit", "s" = "hsplit", "h" = "jump_view_left", "j" = "jump_view_down", "k" = "jump_view_up", "l" = "jump_view_right", "q" = "wclose", "o" = "wonly", "r" = "rotate_view" }

# Buffer Navigation
"A-," = "goto_previous_buffer"
"A-." = "goto_next_buffer"
"A-w" = ":buffer-close"
"A-W" = ":buffer-close-others"

# Pickers / Search
"C-p" = "file_picker"
"C-S-p" = "command_palette"
"C-b" = "buffer_picker"
"C-f" = "global_search"
"C-S-f" = "file_picker_in_current_directory"
"C-/" = "toggle_comments"

# LSP Actions
"C-." = "code_action"
"C-r" = "rename_symbol"

# Scrolling (centered)
"C-d" = ["half_page_down", "align_view_center"]
"C-u" = ["half_page_up", "align_view_center"]
"C-e" = "scroll_down"
"C-y" = "scroll_up"
"pagedown" = ["page_down", "align_view_center"]
"pageup" = ["page_up", "align_view_center"]

# Search (centered)
"n" = ["search_next", "align_view_center"]
"N" = ["search_prev", "align_view_center"]
"*" = ["search_selection", "align_view_center"]

# Editing
"u" = "undo"
"U" = "redo"
">" = "indent"
"<" = "unindent"

# Clipboard (system)
"C-S-c" = "yank_to_clipboard"
"C-S-v" = "paste_clipboard_after"
"C-S-x" = ["yank_to_clipboard", "delete_selection"]

# Selection
"V" = ["select_mode", "extend_to_line_bounds"]

# Macros
"Q" = "record_macro"
"q" = "replay_macro"

# Jumplist
"C-o" = "jump_backward"
"C-i" = "jump_forward"

# =============================================================================
# KEYS - SPACE (Leader)
# =============================================================================
[keys.normal.space]
"f" = "file_picker"
"F" = "file_picker_in_current_directory"
"b" = "buffer_picker"
"j" = "jumplist_picker"
"'" = "last_picker"
"/" = "global_search"
"s" = "symbol_picker"
"S" = "workspace_symbol_picker"
"a" = "code_action"
"r" = "rename_symbol"
"h" = "hover"
"d" = "goto_definition"
"D" = "goto_declaration"
"i" = "goto_implementation"
"R" = "goto_reference"
"e" = "goto_next_diag"
"E" = "goto_prev_diag"
"p" = ":format"
"v" = "select_all"

[keys.normal.space.w]
"v" = "vsplit"
"s" = "hsplit"
"h" = "jump_view_left"
"j" = "jump_view_down"
"k" = "jump_view_up"
"l" = "jump_view_right"
"q" = "wclose"
"o" = "wonly"
"r" = "rotate_view"

[keys.normal.space.t]
"w" = ":toggle soft-wrap.enable"
"l" = ":toggle line-number relative absolute"
"i" = ":toggle lsp.display-inlay-hints"
"c" = ":toggle cursorline"

[keys.normal.space.g]
"g" = ":sh lazygit"
"d" = ":sh git diff"
"l" = ":sh git log --oneline -20"
"s" = ":sh git status"

[keys.normal.space.q]
"q" = ":quit"
"Q" = ":quit!"
"a" = ":quit-all"
"w" = ":write-quit"

[keys.normal.space.c]
"c" = ":buffer-close"
"o" = ":buffer-close-others"
"a" = ":buffer-close-all"

[keys.normal.space.y]
"y" = "yank_to_clipboard"
"p" = "paste_clipboard_after"
"P" = "paste_clipboard_before"

# =============================================================================
# KEYS - G (Goto)
# =============================================================================
[keys.normal.g]
"d" = "goto_definition"
"D" = "goto_declaration"
"y" = "goto_type_definition"
"i" = "goto_implementation"
"r" = "goto_reference"
"h" = "goto_line_start"
"l" = "goto_line_end"
"s" = "goto_first_nonwhitespace"
"g" = "goto_file_start"
"e" = "goto_file_end"
"t" = "goto_window_top"
"c" = "goto_window_center"
"b" = "goto_window_bottom"
"a" = "goto_last_accessed_file"
"m" = "goto_last_modified_file"
"n" = "goto_next_buffer"
"p" = "goto_previous_buffer"
"." = "goto_last_modification"
"w" = "goto_word"

# =============================================================================
# KEYS - ] (Next)
# =============================================================================
[keys.normal."]"]
"d" = "goto_next_diag"
"g" = "goto_next_change"
"f" = "goto_next_function"
"c" = "goto_next_class"
"p" = "goto_next_paragraph"
"space" = "add_newline_below"

# =============================================================================
# KEYS - [ (Previous)
# =============================================================================
[keys.normal."["]
"d" = "goto_prev_diag"
"g" = "goto_prev_change"
"f" = "goto_prev_function"
"c" = "goto_prev_class"
"p" = "goto_prev_paragraph"
"space" = "add_newline_above"

# =============================================================================
# KEYS - Z (View)
# =============================================================================
[keys.normal.z]
"z" = "align_view_center"
"t" = "align_view_top"
"b" = "align_view_bottom"
"k" = "scroll_up"
"j" = "scroll_down"

# =============================================================================
# KEYS - M (Match/Surround)
# =============================================================================
[keys.normal.m]
"m" = "match_brackets"
"s" = "surround_add"
"r" = "surround_replace"
"d" = "surround_delete"
"a" = "select_textobject_around"
"i" = "select_textobject_inner"

# =============================================================================
# KEYS - INSERT MODE
# =============================================================================
[keys.insert]
"C-s" = [":write", "normal_mode"]
"C-c" = "normal_mode"
"esc" = "normal_mode"
"j" = { "k" = "normal_mode", "j" = "normal_mode" }
"C-space" = "completion"
"C-w" = "delete_word_backward"
"A-backspace" = "delete_word_backward"
"C-h" = "delete_char_backward"
"C-d" = "delete_char_forward"
"C-u" = "kill_to_line_start"
"C-k" = "kill_to_line_end"
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"C-b" = "move_char_left"
"C-f" = "move_char_right"
"A-b" = "move_prev_word_start"
"A-f" = "move_next_word_end"
"C-z" = "undo"

# =============================================================================
# KEYS - SELECT MODE
# =============================================================================
[keys.select]
"C-c" = "normal_mode"
"esc" = "normal_mode"
"C-/" = "toggle_comments"
">" = "indent"
"<" = "unindent"
"tab" = "indent"
"S-tab" = "unindent"
"C-S-c" = "yank_to_clipboard"
"C-S-x" = ["yank_to_clipboard", "delete_selection"]
"s" = "shrink_selection"
"o" = "expand_selection"
"i" = "select_textobject_inner"
"a" = "select_textobject_around"
"/" = "search"
"n" = "search_next"
"N" = "search_prev"
"S" = "surround_add"
